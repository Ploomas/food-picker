<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Food Picker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="choice-screen" id="choiceScreen" aria-labelledby="choiceTitle">
        <div class="choice-copy">
          <p class="eyebrow">Zain's food chooser</p>
          <h1 id="choiceTitle">What are you craving?</h1>
          <p class="subcopy">Start with the mood, then swipe until something finally looks worth eating.</p>
          <div class="mini-stats" aria-label="Food list summary">
            <span>Photos on every card</span>
            <span>Swipe left / right</span>
            <span>Final yes list</span>
          </div>
        </div>

        <div class="choice-grid" aria-label="Choose food type">
          <button class="mood-card sugar" type="button" data-start="sugar">
            <span class="mood-photo" aria-hidden="true"></span>
            <span class="mood-pill">Sweet</span>
            <span class="mood-label">Sugar</span>
            <span class="mood-hint">desserts, fruit, Nutella</span>
          </button>

          <button class="mood-card salty" type="button" data-start="salty">
            <span class="mood-photo" aria-hidden="true"></span>
            <span class="mood-pill">Savory</span>
            <span class="mood-label">Salty</span>
            <span class="mood-hint">meals, Turkish food, fries</span>
          </button>
        </div>
      </section>

      <section class="swipe-screen hidden" id="swipeScreen" aria-live="polite">
        <header class="topbar">
          <button class="ghost-btn" type="button" id="backBtn">Change mood</button>
          <div>
            <p class="eyebrow" id="deckMood">Sugar</p>
            <h2 id="deckTitle">Swipe the craving</h2>
          </div>
          <button class="ghost-btn" type="button" id="resetBtn">Reset</button>
        </header>

        <div class="progress">
          <span id="progressText">0 / 0</span>
          <div class="progress-track"><span id="progressBar"></span></div>
          <span id="pickedCount">0 yes</span>
        </div>

        <div class="deck-wrap">
          <div class="empty-state hidden" id="emptyState">
            <p class="eyebrow">decision time</p>
            <h2>Done.</h2>
            <p id="doneText">Here are the foods she said yes to.</p>
            <div class="picked-list" id="pickedList"></div>
            <div class="result-actions">
              <button class="primary-btn" type="button" id="againBtn">Start again</button>
              <button class="ghost-btn" type="button" id="copyBtn">Copy picks</button>
            </div>
          </div>

          <div class="deck" id="deck" aria-label="Swipe cards"></div>
        </div>

        <div class="actions">
          <button class="round-btn nope" type="button" id="noBtn" aria-label="Swipe left">
            <span>No</span>
            <small>left</small>
          </button>
          <button class="round-btn yes" type="button" id="yesBtn" aria-label="Swipe right">
            <span>Yes</span>
            <small>right</small>
          </button>
        </div>
      </section>
    </main>

    <script src="./food-list.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
